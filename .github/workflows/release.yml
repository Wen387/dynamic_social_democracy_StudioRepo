name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: |
          # Include out/html text files (index, scripts, styles) for Studio
          # indexer sidebar/runtime evidence. Exclude large media assets.
          tar -czf dynamic-sdaah-source.tar.gz \
            source/ package.json LICENSE README.md \
            --exclude='out/html/img' \
            --exclude='out/html/music' \
            --exclude='out/html/favicon.ico' \
            --exclude='out/html/.jshintrc' \
            out/html/
      - name: Package art assets
        run: |
          # Separate archive for images and music (large, optional download).
          tar -czf dynamic-sdaah-assets.tar.gz \
            out/html/img/ out/html/music/
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dynamic-sdaah-source.tar.gz
            dynamic-sdaah-assets.tar.gz
