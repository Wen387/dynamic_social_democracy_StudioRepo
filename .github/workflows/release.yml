name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: tar -czf dynamic-sdaah-source.tar.gz source/ package.json LICENSE README.md
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dynamic-sdaah-source.tar.gz
